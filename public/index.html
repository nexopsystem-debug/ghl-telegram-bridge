<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntegraciÃ³n Telegram <-> GoHighLevel</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --success: #10b981;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(16px);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 10px;
      background: linear-gradient(to right, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .setup-section {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 30px;
    }

    .setup-section h2 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-group label {
      font-size: 0.9rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .input-row {
      display: flex;
      gap: 12px;
    }

    input[type="text"] {
      flex: 1;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      padding: 14px 20px;
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    button {
      background: var(--primary);
      color: var(--text);
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .bot-list-section h2 {
      font-size: 1.4rem;
      margin-bottom: 16px;
      font-weight: 600;
    }

    .bot-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bot-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .bot-item:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(99, 102, 241, 0.3);
    }

    .bot-info h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .bot-info p {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.2);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .btn-delete:hover {
      background: var(--danger);
      color: var(--text);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-style: italic;
    }

    .alert {
      padding: 16px 20px;
      border-radius: 12px;
      margin-bottom: 24px;
      font-size: 0.95rem;
      display: none;
    }

    .alert-success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--success);
    }

    .alert-danger {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--danger);
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <h1>ConexiÃ³n Telegram Bots para GHL</h1>
    <p>Administra los bots de Telegram que interactÃºan con tu bandeja de entrada de GoHighLevel</p>
  </header>

  <div id="alert" class="alert"></div>

  <div class="setup-section">
    <h2>Vincular Nuevo Bot</h2>
    <div class="input-group">
      <label for="bot-token">Token del Bot de Telegram</label>
      <div class="input-row">
        <input type="text" id="bot-token" placeholder="Ej: 1234567890:ABCdefGhIJKlmNoPQRsTUVwxyZ">
        <button id="btn-add">Registrar Bot</button>
      </div>
    </div>
  </div>

  <div class="bot-list-section">
    <h2>Bots Vinculados en esta Cuenta</h2>
    <div id="bot-list" class="bot-list">
      <div class="empty-state">Cargando bots...</div>
    </div>
  </div>
</div>

<script>
  // Obtener locationId de la URL
  const urlParams = new URLSearchParams(window.location.search);
  const locationId = urlParams.get('locationId');

  const alertEl = document.getElementById('alert');
  const botListEl = document.getElementById('bot-list');
  const botTokenInput = document.getElementById('bot-token');
  const btnAdd = document.getElementById('btn-add');

  if (!locationId) {
    showAlert('Error: Location ID de GoHighLevel no especificado en la URL. Inicia sesiÃ³n desde tu GHL App.', 'danger');
    btnAdd.disabled = true;
    botTokenInput.disabled = true;
  } else {
    loadBots();
  }

  function showAlert(message, type) {
    alertEl.textContent = message;
    alertEl.className = `alert alert-${type}`;
    alertEl.style.display = 'block';
    setTimeout(() => {
      alertEl.style.display = 'none';
    }, 5000);
  }

  async function loadBots() {
    try {
      const res = await fetch(`/api/bots?locationId=${locationId}`);
      const data = await res.json();

      if (data.success) {
        renderBots(data.bots);
      } else {
        showAlert(data.error || 'Error al cargar bots.', 'danger');
      }
    } catch (e) {
      console.error(e);
      botListEl.innerHTML = '<div class="empty-state">Error de conexiÃ³n al cargar bots.</div>';
    }
  }

  function renderBots(bots) {
    if (bots.length === 0) {
      botListEl.innerHTML = '<div class="empty-state">No hay bots de Telegram vinculados a esta locaciÃ³n de GHL.</div>';
      return;
    }

    botListEl.innerHTML = '';
    bots.forEach(bot => {
      const item = document.createElement('div');
      item.className = 'bot-item';
      item.innerHTML = `
        <div class="bot-info">
          <h3>${bot.name}</h3>
          <p>@${bot.username}</p>
        </div>
        <button class="btn-delete" onclick="deleteBot(${bot.id})">Eliminar</button>
      `;
      botListEl.appendChild(item);
    });
  }

  btnAdd.addEventListener('click', async () => {
    const token = botTokenInput.value.trim();
    if (!token) {
      showAlert('Por favor ingresa un token vÃ¡lido de bot.', 'danger');
      return;
    }

    btnAdd.disabled = true;
    btnAdd.textContent = 'Registrando...';

    try {
      const res = await fetch('/api/bots', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ botToken: token, locationId })
      });
      const data = await res.json();

      if (data.success) {
        showAlert('Â¡Bot registrado y webhook configurado exitosamente!', 'success');
        botTokenInput.value = '';
        loadBots();
      } else {
        showAlert(data.error || 'No se pudo registrar el bot.', 'danger');
      }
    } catch (e) {
      showAlert('Error de red al registrar el bot.', 'danger');
    } finally {
      btnAdd.disabled = false;
      btnAdd.textContent = 'Registrar Bot';
    }
  });

  async function deleteBot(botId) {
    if (!confirm('Â¿EstÃ¡s seguro de eliminar este bot? Se desconectarÃ¡ de Telegram.')) return;

    try {
      const res = await fetch(`/api/bots/${botId}?locationId=${locationId}`, {
        method: 'DELETE'
      });
      const data = await res.json();

      if (data.success) {
        showAlert('Bot eliminado y desvinculado con Ã©xito.', 'success');
        loadBots();
      } else {
        showAlert(data.error || 'No se pudo eliminar el bot.', 'danger');
      }
    } catch (e) {
      showAlert('Error de red al eliminar el bot.', 'danger');
    }
  }
</script>
</body>
</html>
